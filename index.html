            :root {

                --card-bg: rgba(31, 41, 55, 0.7);
                --text-main: #f9fafb;
                --text-muted: #9ca3af;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--glass-shadow);
        }

        .chapter-title {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 2rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
        }

        .criterion {
            background: rgba(128, 128, 128, 0.05);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        
        .criterion:hover {
            transform: translateX(4px);
            background: rgba(128, 128, 128, 0.1);
        }

        .criterion-info { flex: 1; padding-right: 1rem; }
        .criterion-id { font-weight: bold; color: var(--primary); margin-right: 0.5rem; }
        .criterion-text { font-size: 0.95rem; }
        .criterion-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

        .criterion-controls { display: flex; gap: 0.5rem; }

        .radio-group input[type="radio"] { display: none; }
        .radio-group label {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .radio-group input[type="radio"]:checked + label.lbl-oui {
            background: var(--success); border-color: var(--success); color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        .radio-group input[type="radio"]:checked + label.lbl-non {
            background: var(--danger); border-color: var(--danger); color: white;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .radio-group input[type="radio"]:checked + label.lbl-na {
            background: var(--warning); border-color: var(--warning); color: white;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
        }

        .results-panel { position: sticky; top: 2rem; height: fit-content; }

        .star-result {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(128, 128, 128, 0.05);
            border-left: 4px solid var(--text-muted);
        }

        .star-result.eligible { border-left-color: var(--success); background: rgba(16, 185, 129, 0.05); }
        .star-result.not-eligible { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.05); }

        .star-header {
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 1.2rem; margin-bottom: 0.5rem;
        }
        .star-icon { color: #FBBF24; }
        
        .progress-bar {
            height: 6px; background: rgba(128,128,128,0.2); border-radius: 3px; margin: 0.5rem 0; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }

        .result-details { font-size: 0.85rem; color: var(--text-muted); }
        .reason-fail { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; font-weight: 600; }
    </style>
</head>

  [113, '2. Services aux clients', 'Existence d\'un site internet ou d\'une page internet dédiée', 2, 'O', 'O', 'O', 'X', 'X'],
  [114, '2. Services aux clients', 'Existence d\'un site internet ou page internet en langue étrangère', 1, 'O', 'O', 'O', 'X', 'X'],
  [115, '2. Services aux clients', 'Animaux de compagnie admis', 2, 'O', 'O', 'O', 'O', 'O'],
  [116, '3. Accessibilité et développement durable', 'Informations concernant l\'accessibilité sur les supports d\'information', 2, 'X', 'X', 'X', 'X', 'X'],
  [117, '3. Accessibilité et développement durable', 'Mise à disposition de télécommande à grosses touches et de couleurs contrastées', 2, 'O', 'O', 'O', 'O', 'O'],
  [118, '3. Accessibilité et développement durable', 'Présence d\'un siège de douche avec barre d\'appui', 2, 'O', 'O', 'O', 'O', 'O'],
  [119, '3. Accessibilité et développement durable', 'Présence de WC avec barre d\'appui', 2, 'O', 'O', 'O', 'O', 'O'],
  [120, '3. Accessibilité et développement durable', 'Largeur de toutes les portes adaptées', 2, 'O', 'O', 'O', 'O', 'O'],
  [121, '3. Accessibilité et développement durable', 'Document accessible mis à disposition', 1, 'X', 'X', 'X', 'X', 'X'],
  [122, '3. Accessibilité et développement durable', 'Obtention du label Tourisme et Handicap', 3, 'O', 'O', 'O', 'O', 'O'],
  [123, '3. Accessibilité et développement durable', 'Mise en œuvre d\'une mesure de réduction de consommation d\'énergie', 3, 'X', 'X', 'X', 'X', 'X'],
  [124, '3. Accessibilité et développement durable', 'Mise en œuvre d\'une mesure de réduction d\'énergie supplémentaire', 1, 'O', 'O', 'O', 'O', 'O'],
  [125, '3. Accessibilité et développement durable', 'Borne de recharge pour les véhicules électriques', 2, 'O', 'O', 'O', 'O', 'O'],
  [126, '3. Accessibilité et développement durable', 'Mise en œuvre d\'une mesure de réduction de consommation d\'eau', 3, 'X', 'X', 'X', 'X', 'X'],
  [127, '3. Accessibilité et développement durable', 'Mise en œuvre d\'une mesure de réduction d\'eau supplémentaire', 1, 'O', 'O', 'O', 'O', 'O'],
  [128, '3. Accessibilité et développement durable', 'Existence d\'un système de tri des déchets dédié au logement', 1, 'X', 'X', 'X', 'X', 'X'],
  [129, '3. Accessibilité et développement durable', 'Existence d\'un composteur', 1, 'O', 'O', 'O', 'O', 'O'],
  [130, '3. Accessibilité et développement durable', 'Sensibilisation des clients sur les actions respect de l\'environnement', 2, 'X', 'X', 'X', 'X', 'X'],
  [131, '3. Accessibilité et développement durable', 'Présence de produits d\'accueil écologiques dans la salle de bains', 2, 'O', 'O', 'O', 'O', 'O'],
  [132, '3. Accessibilité et développement durable', 'Mise à disposition d\'au moins deux produits d\'entretien respectueux de l\'environnement', 1, 'X', 'X', 'X', 'X', 'X'],
  [133, '3. Accessibilité et développement durable', 'Obtention d\'un label environnemental', 3, 'O', 'O', 'O', 'O', 'O']
    ];

    const criteria = criteriaData.map(c => ({
        id: c[0] === 0 ? 'PRQ1' : c[0],
        chapter: c[1],
        text: c[2],
        points: c[3],
        s: [c[4], c[5], c[6], c[7], c[8]]
    }));

    const selections = {};

    function init() {
        const formContainer = document.getElementById('form-container');
        let currentChapter = '';

        criteria.forEach(c => {
            if (c.chapter !== currentChapter) {
                currentChapter = c.chapter;
                const chapterEl = document.createElement('h2');
                chapterEl.className = 'chapter-title';
                chapterEl.textContent = currentChapter;
                formContainer.appendChild(chapterEl);
            }

            const div = document.createElement('div');
            div.className = 'criterion';
            
            let statusesDisplay = '';
            [1,2,3,4,5].forEach((s, idx) => {
               if(c.s[idx] && c.s[idx] !== 'NA') {
                   statusesDisplay += `<span title="Etoile ${s}">${s}*: ${c.s[idx]}</span> `;
               }
            });

            div.innerHTML = `
                <div class="criterion-info">
                    <div><span class="criterion-id">#${c.id}</span> <span class="criterion-text">${c.text}</span></div>
                    <div class="criterion-meta">${c.points} pts | Applicabilité : ${statusesDisplay}</div>
                </div>
                <div class="criterion-controls radio-group">
                    <input type="radio" id="c_${c.id}_oui" name="c_${c.id}" value="oui">
                    <label class="lbl-oui" for="c_${c.id}_oui">OUI</label>
                    
                    <input type="radio" id="c_${c.id}_non" name="c_${c.id}" value="non">
                    <label class="lbl-non" for="c_${c.id}_non">NON</label>
                    
                    <input type="radio" id="c_${c.id}_na" name="c_${c.id}" value="na">
                    <label class="lbl-na" for="c_${c.id}_na">N/A</label>
                </div>
            `;
            formContainer.appendChild(div);

            const radios = div.querySelectorAll('input[type="radio"]');
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    selections[c.id] = e.target.value;
                    calculate();
                });
            });
        });

        calculate();
    }

    function calculate() {
        const resultsContainer = document.getElementById('results-container');
        resultsContainer.innerHTML = '';
        
        const stars = [1, 2, 3, 4, 5];
        const optThresholds = [0.05, 0.10, 0.20, 0.30, 0.40];

        stars.forEach(star => {
            let reqTotal = 0;
            let reqObtained = 0;
            let optTotal = 0;
            let optObtained = 0;
            let oncFailed = false;
            let preqFailed = false;

            criteria.forEach(c => {
                let status = c.s[star - 1]; 
                let val = selections[c.id]; 
                let pts = parseInt(c.points) || 0;

                let effectiveVal = val || 'non';

                if (effectiveVal === 'na') {
                    if (status === 'X ONC') { oncFailed = true; }
                    return; 
                }

                if (status === 'PRQ') {
                    if (effectiveVal !== 'oui') preqFailed = true;
                } else if (status === 'X' || status === 'X ONC') {
                    reqTotal += pts;
                    if (effectiveVal === 'oui') {
                        reqObtained += pts;
                    } else if (status === 'X ONC') {
                        oncFailed = true;
                    }
                } else if (status === 'O') {
                    optTotal += pts;
                    if (effectiveVal === 'oui') {
                        optObtained += pts;
                    }
                }
            });

            let isEligible = true;
            let failReason = [];

            if (preqFailed) {
                isEligible = false;
                failReason.push("Le prérequis (surface minimale) n'est pas rempli.");
            }
            if (oncFailed) {
                isEligible = false;
                failReason.push("Critères obligatoires non compensables (X ONC) manquants ou NA.");
            }

            let minReqPts = Math.ceil(reqTotal * 0.95);
            let missingReq = Math.max(0, reqTotal - reqObtained);

            if (reqObtained < minReqPts && reqTotal > 0) {
                isEligible = false;
                failReason.push(`Points obligatoires insuffisants (${reqObtained}/${reqTotal}). Vous devez atteindre au moins 95% (${minReqPts} pts).`);
            }

            let compensationNeeded = missingReq * 3;
            let remainingOptObtained = optObtained - compensationNeeded;

            if (remainingOptObtained < 0) {
                isEligible = false;
                failReason.push(`Points optionnels insuffisants pour compenser le déficit obligatoire (il manque ${missingReq} pts, nécessitant ${compensationNeeded} pts optionnels).`);
            }

            let reqOpt = Math.ceil(optTotal * optThresholds[star - 1]);
            if (remainingOptObtained < reqOpt) {
                isEligible = false;
                failReason.push(`Points optionnels insuffisants (${Math.max(0, remainingOptObtained)} / ${reqOpt} requis après compensation).`);
            }

            const resDiv = document.createElement('div');
            resDiv.className = `star-result ${isEligible ? 'eligible' : 'not-eligible'}`;
            
            let starsHtml = '';
            for(let i=0; i<star; i++) starsHtml += '★';

            let progressPct = reqTotal > 0 ? Math.min(100, (reqObtained / reqTotal) * 100) : 100;

            resDiv.innerHTML = `
                <div class="star-header">
                    <span>${star} Étoile${star > 1 ? 's' : ''}</span>
                    <span class="star-icon">${starsHtml}</span>
                </div>
                <div class="result-details">
                    <div>Obligatoires : ${reqObtained} / ${reqTotal} (Min 95%: ${minReqPts})</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progressPct}%"></div></div>
                    <div>Optionnels : ${optObtained} / ${optTotal}</div>
                    ${compensationNeeded > 0 ? `<div><em>Compensation appliquée : -${compensationNeeded} pts optionnels</em></div>` : ''}
                    <div>Optionnels Requis (après comp.) : ${Math.max(0, remainingOptObtained)} / ${reqOpt} (Min ${optThresholds[star-1]*100}%)</div>
                </div>
                ${!isEligible ? `<div class="reason-fail">${failReason.join('<br>')}</div>` : '<div style="color: var(--success); font-weight: bold; margin-top: 0.5rem;">Éligible ! ✓</div>'}
            `;
            resultsContainer.appendChild(resDiv);
        });
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
